<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mOGu Marketplace - Profile</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js" defer></script>
</head>
<body>
    <!-- STICKY NAVBAR -->
    <nav class="topnav">
        <div class="nav-links nav-main" id="main-links">
            <a href="Home.html">Home</a>
            <a href="Explore.html">Explore</a>
            <a href="About.html">About Us</a>
        </div>
        <span class="hamburger" onclick="toggleMenu()">&#9776;</span>
        <div class="nav-links nav-secondary" id="auth-links">
            <!-- Injected via updateNavbar() -->
        </div>
    </nav>

    <div class="profile-container">
        
        <!-- DYNAMIC HEADER -->
        <div class="profile-header" id="profile-header">
            <!-- Injected via JS -->
        </div>

        <!-- TABS BAR -->
        <div class="profile-tabs" id="tabs-container">
            <!-- Injected via JS -->
        </div>

        <!-- TAB CONTENT: INFO -->
        <div id="tab-info" class="tab-content active">
            <h2>Personal Information</h2>
            <div id="info-cards" style="display: flex; gap: 20px;">
                <!-- Cards Injected via JS -->
            </div>
        </div>

        <!-- TAB CONTENT: EDIT PROFILE (Self Only) -->
        <div id="tab-edit" class="tab-content">
            <h2>Edit Profile</h2>
            <form id="editProfileForm">
                <div class="edit-form-group">
                    <label>Profile Image (Leave blank to keep current):</label>
                    <input type="file" id="editImage" accept="image/*">
                </div>
                <div class="edit-form-group">
                    <label>Name:</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="edit-form-group">
                    <label>Age:</label>
                    <input type="number" id="editAge" required>
                </div>
                <div class="edit-form-group">
                    <label>Email:</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="edit-form-group">
                    <label>New Password (Leave blank to keep current):</label>
                    <input type="password" id="editPassword">
                </div>
                <button type="submit" class="add-product-btn" style="width: 100%;">Save Changes</button>
            </form>
        </div>

        <!-- TAB CONTENT: PRODUCTS (Self or Other) -->
        <div id="tab-products" class="tab-content">
            <div id="products-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Products List</h2>
                <!-- Add Product Button injected here if Self -->
            </div>
            
            <div class="product-grid" id="profile-product-grid">
                <!-- Products injected via JS -->
            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>mOGu Marketplace - Your all in one solution to shopping</p>
        <p>Contact: support@mogu.com</p>
        <div class="social-icons">
            <a href="#" class="social-link">FB</a>
            <a href="#" class="social-link">IG</a>
            <a href="#" class="social-link">TW</a>
        </div>
    </footer>

    <script>
        // --- Initialization ---
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const allUsers = JSON.parse(localStorage.getItem('users')) || [];
        const allProducts = JSON.parse(localStorage.getItem('products')) || [];
        
        // Determine if viewing self or another user
        const viewSellerName = localStorage.getItem('viewSeller');
        let isSelf = false;
        let profileUser = null;

        if (viewSellerName) {
            // Viewing someone else
            // Find user by name, if not found (dummy data), create a mock user object
            profileUser = allUsers.find(u => u.name === viewSellerName) || {
                name: viewSellerName,
                email: "contact@" + viewSellerName.replace(/\s+/g, '').toLowerCase() + ".com",
                profileImage: "default-avatar.png",
                age: "N/A"
            };
            isSelf = false;
        } else if (currentUser) {
            // Viewing self
            profileUser = currentUser;
            isSelf = true;
        } else {
            // Not logged in and not viewing a seller = redirect
            alert("Please login to view your profile.");
            window.location.href = "Login.html";
        }

        // --- Core Rendering Functions ---
        
        function renderHeader() {
            // Calculate products sold (mock calculation based on products they sell)
            const userProducts = allProducts.filter(p => p.seller === profileUser.name);
            const totalSold = userProducts.reduce((sum, p) => sum + (p.sold || 0), 0);

            document.getElementById('profile-header').innerHTML = `
                <img src="${profileUser.profileImage || 'default-avatar.png'}" alt="Profile Image">
                <div>
                    <h1 style="margin: 0;">${profileUser.name}</h1>
                    <p style="margin: 5px 0; color: gray;">${profileUser.email}</p>
                    <div class="profile-stats">
                        <div class="stat-card"><strong>${userProducts.length}</strong> Active Listings</div>
                        <div class="stat-card"><strong>${totalSold}</strong> Items Sold</div>
                    </div>
                </div>
            `;
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            
            if (isSelf) {
                tabsContainer.innerHTML = `
                    <button class="tab-btn active" onclick="switchTab('tab-info', this)">Profile Info</button>
                    <button class="tab-btn" onclick="switchTab('tab-edit', this)">Edit Profile</button>
                    <button class="tab-btn" onclick="switchTab('tab-products', this)">My Products</button>
                `;
            } else {
                tabsContainer.innerHTML = `
                    <button class="tab-btn active" onclick="switchTab('tab-info', this)">Profile Info</button>
                    <button class="tab-btn" onclick="switchTab('tab-products', this)">Products</button>
                `;
            }
        }

        function switchTab(tabId, btnElement) {
            // Hide all contents
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        function renderInfoTab() {
            const infoContainer = document.getElementById('info-cards');
            if (isSelf) {
                infoContainer.innerHTML = `
                    <div class="stat-card" style="flex: 1;">
                        <h3>Age</h3>
                        <p>${profileUser.age} years old</p>
                    </div>
                    <div class="stat-card" style="flex: 1;">
                        <h3>Password</h3>
                        <p>
                            <span id="pass-display">••••••••</span>
                            <button onclick="toggleProfilePass()" style="margin-left: 10px; cursor: pointer; padding: 5px; border-radius:4px; border:1px solid #ccc;">Show</button>
                        </p>
                    </div>
                `;
                
                // Pre-fill Edit Form
                document.getElementById('editName').value = profileUser.name;
                document.getElementById('editAge').value = profileUser.age;
                document.getElementById('editEmail').value = profileUser.email;
            } else {
                infoContainer.innerHTML = `
                    <p>Contact Email: ${profileUser.email}</p>
                `;
            }
        }

        function toggleProfilePass() {
            const display = document.getElementById('pass-display');
            display.innerText = display.innerText === '••••••••' ? profileUser.password : '••••••••';
        }

        function renderProductsTab() {
            const grid = document.getElementById('profile-product-grid');
            const headerRow = document.getElementById('products-header');
            grid.innerHTML = "";

            if (isSelf && !document.getElementById('addBtnContainer')) {
                headerRow.innerHTML += `<button id="addBtnContainer" class="add-product-btn" onclick="window.location.href='AddProduct.html'">+ Add New Product</button>`;
            }

            const userProducts = allProducts.filter(p => p.seller === profileUser.name);

            if (userProducts.length === 0) {
                grid.innerHTML = "<p>No products listed yet.</p>";
                return;
            }

            userProducts.forEach(prod => {
                let actionHtml = "";
                if (isSelf) {
                    actionHtml = `
                        <div class="product-actions">
                            <button class="edit-btn" onclick="editProduct(${prod.id}, event)">Edit</button>
                            <button class="delete-btn" onclick="deleteProduct(${prod.id}, event)">Delete</button>
                        </div>
                    `;
                }

                grid.innerHTML += `
                    <div class="product-card" onclick="goToProduct(${prod.id})">
                        <img src="${prod.image}" alt="${prod.name}">
                        <h3>${prod.name}</h3>
                        <p class="price">$${prod.price}</p>
                        <p>Stock: ${prod.stock || 50}</p>
                        ${actionHtml}
                    </div>
                `;
            });
        }

        // --- Actions ---

        // Handle Edit Form Submission (Self)
        document.getElementById("editProfileForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const newName = document.getElementById('editName').value;
            const newAge = document.getElementById('editAge').value;
            const newEmail = document.getElementById('editEmail').value;
            const newPass = document.getElementById('editPassword').value;

            // Update user object
            profileUser.name = newName;
            profileUser.age = newAge;
            profileUser.email = newEmail;
            if (newPass) profileUser.password = newPass;

            // Save to localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.email === currentUser.email);
            if (userIndex !== -1) {
                users[userIndex] = profileUser;
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(profileUser)); // update session
                
                alert("Profile information updated successfully!");
                window.location.reload();
            }
        });

        // Product Actions
        function goToProduct(productId) {
            localStorage.setItem('selectedProductId', productId);
            // Clear viewSeller so we don't accidentally get stuck in other-profile mode later
            localStorage.removeItem('viewSeller');
            window.location.href = "ProductInfo.html";
        }

        function editProduct(productId, event) {
            event.stopPropagation(); // prevent card click
            localStorage.setItem('editProductId', productId);
            window.location.href = "EditProduct.html";
        }

        function deleteProduct(productId, event) {
            event.stopPropagation(); // prevent card click
            if (confirm("Are you sure you want to delete this product? This action cannot be undone.")) {
                const updatedProducts = allProducts.filter(p => p.id !== productId);
                localStorage.setItem('products', JSON.stringify(updatedProducts));
                alert("Product deleted.");
                window.location.reload();
            }
        }

        // --- Run on Load ---
        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
            renderTabs();
            renderInfoTab();
            renderProductsTab();
        });

        // Clean up viewSeller flag when leaving page (optional, but good practice)
        window.onbeforeunload = function() {
            if(!isSelf) {
               localStorage.removeItem('viewSeller');
            }
        };
    </script>
</body>
</html>
